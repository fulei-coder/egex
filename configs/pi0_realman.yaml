# Pi0 训练配置 - RealMan RM65
#
# Pi0 使用 PaliGemma (2B参数) 作为 VLM 骨干
# 泛化能力最强，但显存需求大
#
# ⚠️ 硬件要求: 24GB+ VRAM (A100/H100 推荐)
# ⚠️ 消费级显卡建议用 SmolVLA 替代
#
# 用法:
#   python -m lerobot.scripts.lerobot_train --config configs/pi0_realman.yaml

dataset:
  repo_id: lerobot/pick_cube_30fps
  root: data/pick_cube_30fps
  video_backend: pyav

policy:
  type: pi0
  repo_id: your_name/pi0_realman_pick_cube

  # Pi0 核心参数
  n_obs_steps: 1
  chunk_size: 50
  n_action_steps: 50

  # VLM 基座
  paligemma_variant: gemma_2b
  action_expert_variant: gemma_300m
  dtype: bfloat16

  image_resolution: [224, 224]

  # Flow Matching
  num_inference_steps: 10
  time_sampling_beta_alpha: 1.5
  time_sampling_beta_beta: 1.0

  # ⭐ 显存优化（必须！）
  freeze_vision_encoder: true
  train_expert_only: true
  gradient_checkpointing: true

  tokenizer_max_length: 48

  # 优化器
  optimizer_lr: 2.5e-5
  optimizer_betas: [0.9, 0.95]
  optimizer_weight_decay: 0.01
  optimizer_grad_clip_norm: 1.0

  # 学习率调度
  scheduler_warmup_steps: 1000
  scheduler_decay_steps: 30000
  scheduler_decay_lr: 2.5e-6

batch_size: 2
steps: 30000

save_checkpoint: true
save_freq: 2500
eval_freq: 5000
log_freq: 50

output_dir: outputs/pi0_realman_pick_cube

seed: 42
num_workers: 2

wandb:
  enable: false

# 显存估算:
# gemma_2b + freeze + train_expert_only + gradient_checkpointing:
#   A100 40GB: 舒适
#   RTX 4090 24GB: batch_size=2 勉强
# 如果 OOM:
#   1. paligemma_variant: gemma_300m
#   2. batch_size: 1
